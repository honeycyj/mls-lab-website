server {
  listen 80;
  server_name example.com;

  root /var/www/mls-lab-website/dist;
  index index.html;

  # Cache hashed static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Cache common static files for a shorter period.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|mp4|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback for React Router.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
